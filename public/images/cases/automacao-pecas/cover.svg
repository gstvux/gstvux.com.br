<svg viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lime-purple" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#99A922"/>
      <stop offset="100%" stop-color="#6041A8"/>
    </linearGradient>
    <linearGradient id="lime-fade" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#99A922" stop-opacity="0"/>
      <stop offset="100%" stop-color="#99A922"/>
    </linearGradient>
    <linearGradient id="purple-fade" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6041A8"/>
      <stop offset="100%" stop-color="#6041A8" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow-lime">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#99A922" flood-opacity="0.6"/>
    </filter>
    <filter id="glow-purple">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#6041A8" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-soft">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#99A922" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0D0D0D"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="1.5" cy="1.5" r="1" fill="#99A922" fill-opacity="0.07"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Radial vignette from center -->
  <radialGradient id="center-glow" cx="50%" cy="50%" r="55%" gradientUnits="userSpaceOnUse" fx="600" fy="315">
    <stop offset="0%" stop-color="#1A1A1A"/>
    <stop offset="100%" stop-color="#0D0D0D"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#center-glow)"/>

  <!-- ── LEFT CLUSTER — Spreadsheets ── -->
  <!-- Sheet stack shadow -->
  <rect x="98" y="200" width="200" height="240" rx="8" fill="#1A1A1A" stroke="#99A922" stroke-opacity="0.15"/>
  <rect x="90" y="192" width="200" height="240" rx="8" fill="#1A1A1A" stroke="#99A922" stroke-opacity="0.25"/>
  <!-- Main sheet -->
  <rect x="82" y="184" width="200" height="240" rx="8" fill="#141414" stroke="#99A922" stroke-width="1.5"/>
  <!-- Sheet header bar -->
  <rect x="82" y="184" width="200" height="32" rx="8" fill="#99A922" fill-opacity="0.12"/>
  <rect x="82" y="204" width="200" height="12" fill="#99A922" fill-opacity="0.12"/>
  <!-- Row lines -->
  <line x1="100" y1="240" x2="264" y2="240" stroke="#99A922" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="100" y1="260" x2="264" y2="260" stroke="#99A922" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="100" y1="280" x2="264" y2="280" stroke="#99A922" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="100" y1="300" x2="264" y2="300" stroke="#99A922" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="100" y1="320" x2="264" y2="320" stroke="#99A922" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="100" y1="340" x2="264" y2="340" stroke="#99A922" stroke-opacity="0.12" stroke-width="1"/>
  <!-- Col separator -->
  <line x1="160" y1="216" x2="160" y2="408" stroke="#99A922" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="210" y1="216" x2="210" y2="408" stroke="#99A922" stroke-opacity="0.1" stroke-width="1"/>
  <!-- Data cells highlights -->
  <rect x="100" y="243" width="54" height="12" rx="2" fill="#99A922" fill-opacity="0.18"/>
  <rect x="163" y="263" width="40" height="12" rx="2" fill="#99A922" fill-opacity="0.12"/>
  <rect x="100" y="283" width="30" height="12" rx="2" fill="#6041A8" fill-opacity="0.25"/>
  <rect x="100" y="303" width="54" height="12" rx="2" fill="#99A922" fill-opacity="0.1"/>
  <rect x="163" y="323" width="40" height="12" rx="2" fill="#99A922" fill-opacity="0.1"/>
  <!-- Sheet label -->
  <text x="100" y="202" font-family="monospace" font-size="11" fill="#99A922" fill-opacity="0.7">planilhas_pp.xlsm</text>
  <!-- Count badge -->
  <rect x="222" y="184" width="44" height="22" rx="4" fill="#99A922"/>
  <text x="244" y="199" font-family="monospace" font-size="11" font-weight="bold" fill="#0D0D0D" text-anchor="middle">×4</text>

  <!-- ── FLOW LINES — Sheets to Engine ── -->
  <!-- Top flow -->
  <path d="M282 220 L440 220" stroke="url(#lime-fade)" stroke-width="1.5" stroke-dasharray="6 4"/>
  <!-- Middle flow (main) -->
  <path d="M282 305 L440 305" stroke="#99A922" stroke-width="2" filter="url(#glow-lime)"/>
  <circle cx="360" cy="305" r="3" fill="#99A922" filter="url(#glow-lime)"/>
  <!-- Bottom flow -->
  <path d="M282 390 L440 390" stroke="url(#lime-fade)" stroke-width="1.5" stroke-dasharray="6 4"/>
  <!-- Arrow head -->
  <polygon points="435,298 447,305 435,312" fill="#99A922"/>

  <!-- ── CENTER ENGINE ── -->
  <!-- Outer glow ring -->
  <circle cx="540" cy="305" r="88" fill="none" stroke="#99A922" stroke-opacity="0.08" stroke-width="16"/>
  <circle cx="540" cy="305" r="76" fill="none" stroke="#99A922" stroke-opacity="0.14" stroke-width="1.5" stroke-dasharray="8 4"/>
  <!-- Main engine circle -->
  <circle cx="540" cy="305" r="64" fill="#141414" stroke="#99A922" stroke-width="1.5" filter="url(#glow-soft)"/>
  <!-- Inner purple ring -->
  <circle cx="540" cy="305" r="48" fill="none" stroke="#6041A8" stroke-opacity="0.4" stroke-width="1"/>
  <!-- Engine icon: robot dots -->
  <circle cx="526" cy="295" r="5" fill="#99A922" filter="url(#glow-lime)"/>
  <circle cx="554" cy="295" r="5" fill="#99A922" filter="url(#glow-lime)"/>
  <rect x="519" y="312" width="42" height="6" rx="3" fill="#6041A8"/>
  <rect x="527" y="322" width="26" height="4" rx="2" fill="#99A922" fill-opacity="0.5"/>
  <!-- Label below engine -->
  <text x="540" y="382" font-family="monospace" font-size="11" fill="#DFDACA" fill-opacity="0.5" text-anchor="middle">rpa · python</text>
  <!-- Orbit dots -->
  <circle cx="540" cy="241" r="4" fill="#6041A8" fill-opacity="0.8"/>
  <circle cx="604" cy="305" r="4" fill="#99A922" fill-opacity="0.6"/>
  <circle cx="476" cy="305" r="4" fill="#99A922" fill-opacity="0.6"/>
  <circle cx="540" cy="369" r="4" fill="#6041A8" fill-opacity="0.8"/>

  <!-- ── FLOW LINES — Engine to ERP ── -->
  <!-- Top flow -->
  <path d="M604 220 L760 220" stroke="url(#purple-fade)" stroke-width="1.5" stroke-dasharray="6 4"/>
  <!-- Middle flow (main) -->
  <path d="M604 305 L762 305" stroke="#6041A8" stroke-width="2" filter="url(#glow-purple)"/>
  <circle cx="683" cy="305" r="3" fill="#6041A8" filter="url(#glow-purple)"/>
  <!-- Bottom flow -->
  <path d="M604 390 L760 390" stroke="url(#purple-fade)" stroke-width="1.5" stroke-dasharray="6 4"/>
  <!-- Arrow head -->
  <polygon points="757,298 769,305 757,312" fill="#6041A8"/>

  <!-- ── RIGHT — ERP / Output ── -->
  <!-- ERP container -->
  <rect x="768" y="184" width="200" height="240" rx="8" fill="#141414" stroke="#6041A8" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="768" y="184" width="200" height="32" rx="8" fill="#6041A8" fill-opacity="0.2"/>
  <rect x="768" y="204" width="200" height="12" fill="#6041A8" fill-opacity="0.2"/>
  <!-- ERP rows (filled) -->
  <rect x="786" y="242" width="164" height="12" rx="2" fill="#6041A8" fill-opacity="0.3"/>
  <rect x="786" y="262" width="164" height="12" rx="2" fill="#6041A8" fill-opacity="0.25"/>
  <rect x="786" y="282" width="120" height="12" rx="2" fill="#6041A8" fill-opacity="0.2"/>
  <rect x="786" y="302" width="164" height="12" rx="2" fill="#6041A8" fill-opacity="0.3"/>
  <rect x="786" y="322" width="90" height="12" rx="2" fill="#6041A8" fill-opacity="0.2"/>
  <rect x="786" y="342" width="164" height="12" rx="2" fill="#6041A8" fill-opacity="0.3"/>
  <rect x="786" y="362" width="140" height="12" rx="2" fill="#6041A8" fill-opacity="0.25"/>
  <!-- Status checks -->
  <text x="956" y="254" font-family="monospace" font-size="12" fill="#99A922" filter="url(#glow-lime)">✓</text>
  <text x="956" y="274" font-family="monospace" font-size="12" fill="#99A922">✓</text>
  <text x="956" y="294" font-family="monospace" font-size="12" fill="#99A922">✓</text>
  <text x="956" y="314" font-family="monospace" font-size="12" fill="#99A922">✓</text>
  <text x="956" y="334" font-family="monospace" font-size="12" fill="#99A922">✓</text>
  <text x="956" y="354" font-family="monospace" font-size="12" fill="#99A922">✓</text>
  <text x="956" y="374" font-family="monospace" font-size="12" fill="#99A922">✓</text>
  <!-- ERP label -->
  <text x="786" y="202" font-family="monospace" font-size="11" fill="#6041A8" fill-opacity="0.8">erp.primus</text>

  <!-- ── METRICS PANEL — Bottom center ── -->
  <rect x="340" y="448" width="520" height="96" rx="10" fill="#141414" stroke="url(#lime-purple)" stroke-width="1"/>
  <!-- Metric 1 -->
  <text x="420" y="488" font-family="monospace" font-size="32" font-weight="bold" fill="#99A922" text-anchor="middle" filter="url(#glow-lime)">-94%</text>
  <text x="420" y="512" font-family="monospace" font-size="11" fill="#DFDACA" fill-opacity="0.5" text-anchor="middle">tempo de cadastro</text>
  <!-- Divider -->
  <line x1="530" y1="462" x2="530" y2="528" stroke="#DFDACA" stroke-opacity="0.08" stroke-width="1"/>
  <!-- Metric 2 -->
  <text x="600" y="488" font-family="monospace" font-size="32" font-weight="bold" fill="#DFDACA" text-anchor="middle">490</text>
  <text x="600" y="512" font-family="monospace" font-size="11" fill="#DFDACA" fill-opacity="0.5" text-anchor="middle">peças por lote</text>
  <!-- Divider -->
  <line x1="690" y1="462" x2="690" y2="528" stroke="#DFDACA" stroke-opacity="0.08" stroke-width="1"/>
  <!-- Metric 3 -->
  <text x="760" y="488" font-family="monospace" font-size="32" font-weight="bold" fill="#6041A8" text-anchor="middle" filter="url(#glow-purple)">27s</text>
  <text x="760" y="512" font-family="monospace" font-size="11" fill="#DFDACA" fill-opacity="0.5" text-anchor="middle">por execução</text>

  <!-- ── Top label ── -->
  <text x="600" y="68" font-family="monospace" font-size="13" fill="#DFDACA" fill-opacity="0.35" text-anchor="middle" letter-spacing="4">AUTOMAÇÃO DE PROCESSOS · RPA + PYTHON</text>
  <!-- Main title -->
  <text x="600" y="136" font-family="sans-serif" font-size="38" font-weight="bold" fill="#DFDACA" text-anchor="middle">Cadastro de Peças</text>
  <text x="600" y="170" font-family="sans-serif" font-size="16" fill="#DFDACA" fill-opacity="0.45" text-anchor="middle">indústria moveleira · escala sem headcount</text>
</svg>
